<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#17365d">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title == "Home" %}{{ site.title }}{% else %}{{ page.title }} · {{ site.title }}{% endif %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Libre+Caslon+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% if site.analytics.provider == "google-gtag" and site.analytics.google.tracking_id %}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.analytics.google.tracking_id }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ site.analytics.google.tracking_id }}');
    </script>
    {% endif %}
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <div class="shell site-header__inner">
        <a class="site-name" href="/">Eunsun Kim</a>
        <nav class="site-nav" aria-label="Primary navigation">
          <a {% if page.url == "/" %}class="active"{% endif %} href="/">Home</a>
          <a {% if page.url contains "/research" %}class="active"{% endif %} href="/research/">Research</a>
          <a {% if page.url contains "/teaching" %}class="active"{% endif %} href="/teaching/">Teaching</a>
          <a href="/files/cv.pdf">CV</a>
        </nav>
      </div>
    </header>

    <main id="main-content" class="shell">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="shell site-footer__inner">
        <p>© {{ "now" | date: "%Y" }} Eunsun Kim</p>
        <div class="site-footer__links">
          <a href="mailto:eunsun.kim.phd@anderson.ucla.edu">Email</a>
          <a href="/teaching/">Teaching</a>
          <a href="/files/cv.pdf">CV</a>
        </div>
      </div>
    </footer>
  </body>
</html>
